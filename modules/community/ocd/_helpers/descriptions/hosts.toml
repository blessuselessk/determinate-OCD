[aspect]
id = "infra.hosts"
version = "0.1.0"
role = "Host registry — declares NixOS hosts with their architecture and users"

[context]
id = "hosts-ctx"

[[context.entries]]
key = "ocd-dev"
value = "x86_64-linux host with single user 'admin' (placeholder for real hardware)"

[[context.entries]]
key = "pattern"
value = "den.hosts.<system>.<hostname>.users.<user> = {} — pure data, no function args"
