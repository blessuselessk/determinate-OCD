[aspect]
id = "ocd.context-compile"
version = "0.1.0"
role = "Build pipeline — renders aspect descriptions and PROSE primitives via nuenv + Typst, produces context docs with staleness checks"

[context]
id = "context-compile-ctx"

[[context.entries]]
key = "nuenv-overlay"
value = "pkgs.extend inputs.nuenv.overlays.default — provides nuenv.mkDerivation"

[[context.entries]]
key = "promptyst-linkfarm"
value = "linkFarm \"promptyst-packages\" with local/promptyst/0.2.0 for TYPST_PACKAGE_PATH"

[[context.entries]]
key = "description-sources"
value = "./_helpers/descriptions/ — glob discovers *.toml and *.yaml aspect descriptions"

[[context.entries]]
key = "prose-sources"
value = "Four directories: .ai/agents/*.agent.toml, .ai/instructions/*.instructions.toml, .ai/skills/*/SKILL.toml, .ai/workflows/*.workflow.toml"

[[context.entries]]
key = "build-script"
value = "./_helpers/extract-and-render.nu — Nushell glob-based build orchestrator"

[[context.entries]]
key = "render-templates"
value = "render-aspect.typ (descriptions), render-prose.typ (PROSE primitives), render-agents-md.typ, render-primitive-agents-md.typ"

[[context.entries]]
key = "outputs"
value = "packages.context-docs, packages.write-context-docs, packages.update-dep-refs"

[[context.entries]]
key = "checks"
value = "checks.context-compile (build succeeds), checks.context-docs-fresh (installed files match build), checks.dep-refs-fresh (manifest entries have .md files)"

[[context.entries]]
key = "write-context-docs"
value = "Shell script that installs rendered output to .ai/output/, .ai/AGENTS.md, per-primitive AGENTS.md, PROSE primitives, and .github/ ref pointers"

[[context.entries]]
key = "scope"
value = "perSystem module — uses pkgs and inputs"

[[constraints]]
text = "All description TOMLs must be in _helpers/descriptions/ for glob discovery"
severity = "correctness"

[[constraints]]
text = "PROSE TOML sources must use exact naming conventions: *.agent.toml, *.instructions.toml, */SKILL.toml, *.workflow.toml"
severity = "correctness"

[[constraints]]
text = "Staleness check compares installed .ai/ files byte-for-byte with build output — any mismatch fails nix flake check"
severity = "operational"

[[constraints]]
text = "nuenv sandbox on macOS cannot cp nested dirs from nix store — use open --raw | save instead"
severity = "portability"

[[constraints]]
text = "Skill TOMLs are all named SKILL.toml — build script prefixes with parent dir name to avoid staging collisions"
severity = "correctness"

[[steps]]
text = "Extend pkgs with nuenv overlay and create promptyst linkFarm for TYPST_PACKAGE_PATH"

[[steps]]
text = "Define contextDocs derivation: set env vars for all source dirs and templates, run extract-and-render.nu"

[[steps]]
text = "Build extract-and-render.nu: glob description files, stage into Typst root, render via typst query"

[[steps]]
text = "Generate AGENTS.md (header + composability section), per-primitive AGENTS.md files"

[[steps]]
text = "Render PROSE primitives (agents, instructions, skills, workflows) and ref pointers"

[[steps]]
text = "Define write-context-docs script to install outputs, update-dep-refs for dependency documentation"

[[steps]]
text = "Define staleness checks: context-docs-fresh (diff all outputs) and dep-refs-fresh (manifest entries)"

[[inputs]]
name = "nuenv"
type = "flake-input"
description = "Nushell-based derivation builder (provides nuenv.mkDerivation)"

[[inputs]]
name = "promptyst"
type = "path"
description = "Typst prompt DSL package (flake=false, used via linkFarm)"

[[inputs]]
name = "descriptions"
type = "directory"
description = "Path to _helpers/descriptions/ containing *.toml and *.yaml aspect descriptions"

[schema]
id = "context-compile-output"

[[schema.fields]]
name = "context-docs"
type = "derivation"
description = "Nix store path containing all rendered Markdown, TOML sources, AGENTS.md, PROSE primitives, and ref pointers"

[[schema.fields]]
name = "write-context-docs"
type = "derivation"
description = "Shell script to install rendered output into the working tree"

[[schema.fields]]
name = "staleness-check"
type = "bool"
description = "Whether installed files match the current build output"

[[checkpoints]]
id = "verify-render"
after-step = 3
assertion = "Every description TOML in _helpers/descriptions/ produces a corresponding .md in the output"
on-fail = "halt"

[[checkpoints]]
id = "verify-staleness"
after-step = 7
assertion = "nix flake check passes with checks.context-docs-fresh and checks.dep-refs-fresh"
on-fail = "halt"
