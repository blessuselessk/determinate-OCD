[aspect]
id = "infra.treefmt"
version = "0.1.0"
role = "Source tree formatting — nixfmt, deadnix, mdformat, yamlfmt, taplo, prettier with exclusions for generated files"

[context]
id = "treefmt-ctx"

[[context.entries]]
key = "input"
value = "treefmt-nix (github:numtide/treefmt-nix), inputs.nixpkgs.follows = nixpkgs"

[[context.entries]]
key = "root-marker"
value = "projectRootFile = flake.nix"

[[context.entries]]
key = "formatters"
value = "nixfmt, deadnix, mdformat, yamlfmt, taplo, prettier (JSON only)"

[[context.entries]]
key = "exclusions"
value = "mdformat excludes .ai/output/*, .ai/AGENTS.md, rendered PROSE (.ai/agents/*.md, .ai/instructions/*.md, .ai/workflows/*.md, .ai/skills/*/SKILL.md), per-primitive AGENTS.md files, .ai/context/references/deps/*.md, .github/**/*.md"

[[context.entries]]
key = "on-unmatched"
value = "info (via lib.mkDefault — warns but does not fail)"

[[context.entries]]
key = "scope"
value = "perSystem module — applies to all systems"

[[constraints]]
text = "Generated .ai/ output files must be excluded from mdformat to preserve promptyst rendering"
severity = "correctness"

[[constraints]]
text = "treefmt-nix input must follow nixpkgs to avoid duplicate nixpkgs evaluations"
severity = "performance"

[[constraints]]
text = "on-unmatched must stay info (not error) to tolerate unformatted file types"
severity = "operational"

[[steps]]
text = "Import treefmt-nix.flakeModule and declare the flake input with nixpkgs follows"

[[steps]]
text = "Enable formatters: nixfmt, deadnix, mdformat, yamlfmt, taplo, prettier"

[[steps]]
text = "Add mdformat exclusion patterns for all generated Markdown paths"

[[steps]]
text = "Set projectRootFile to flake.nix and on-unmatched to info"

[[inputs]]
name = "treefmt-nix-url"
type = "string"
description = "Override URL for treefmt-nix input (default: github:numtide/treefmt-nix)"

[schema]
id = "treefmt-output"

[[schema.fields]]
name = "formatted"
type = "bool"
description = "Whether all source files pass formatting checks"

[[schema.fields]]
name = "excluded-paths"
type = "list(string)"
description = "Paths excluded from mdformat"

[[checkpoints]]
id = "verify-exclusions"
after-step = 3
assertion = "All .ai/output/*.md and rendered PROSE files are excluded from mdformat"
on-fail = "halt"
