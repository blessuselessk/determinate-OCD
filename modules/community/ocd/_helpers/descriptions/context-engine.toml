[aspect]
id = "ocd.context-engine"
version = "0.1.0"
role = "Layer 0 context engine — regenerates _context/ artifacts on every NixOS rebuild, exposes context to OpenClaw via well-known paths"

[context]
id = "context-engine-ctx"

[[context.entries]]
key = "status"
value = "INACTIVE — lives under _layer0/ (excluded by /_  infix). Move to modules/community/ocd/context-engine.nix to activate."

[[context.entries]]
key = "classes"
value = "Two classes: nixos (system-level activation script) and homeManager (user-level context exposure)"

[[context.entries]]
key = "flakeRoot"
value = "/etc/nixos — adjust if flake root differs"

[[context.entries]]
key = "namespaces"
value = "community/ocd (extensible list — add user and infra namespaces as needed)"

[[context.entries]]
key = "manifest"
value = "_context/manifest.json — machine-readable inventory: aspects, classes, generation, timestamp"

[[context.entries]]
key = "dependency-map"
value = "_context/dependency-map.md — markdown table parsed from flake.lock (input, type, source, rev)"

[[context.entries]]
key = "contextHome"
value = "${config.xdg.dataHome}/ocd-context — stable path for OpenClaw tool discovery"

[[context.entries]]
key = "env-var"
value = "OCD_CONTEXT_HOME session variable set via home.sessionVariables"

[[context.entries]]
key = "feedback-loop"
value = "rebuild → regenerate _context/ → agent reads → agent modifies → rebuild"

[[constraints]]
text = "Must remain under _layer0/ (inactive) until all prerequisites are met: den wiring, namespaces, working rebuild pipeline"
severity = "safety"

[[constraints]]
text = "Activation script must run after 'etc' and 'users' deps so system state is settled"
severity = "ordering"

[[constraints]]
text = "All _context/ artifacts must be deterministic: same inputs → same outputs (except change-log.md which is append-only)"
severity = "correctness"

[[constraints]]
text = "Context home uses symlinks to actual _context/ dirs — OpenClaw must not need to know flake root path"
severity = "portability"

[[steps]]
text = "Define flakeRoot and namespaces list for context generation scope"

[[steps]]
text = "Create generateManifest script: walk namespace dir, detect aspect classes via grep, produce manifest.json with jq"

[[steps]]
text = "Create generateDependencyMap script: parse flake.lock with jq, produce dependency-map.md table"

[[steps]]
text = "Combine into regenerateContext activation script, wire as system.activationScripts.layer0-context with deps"

[[steps]]
text = "Define homeManager class: set OCD_CONTEXT_HOME env var pointing to xdg.dataHome/ocd-context"

[[inputs]]
name = "flakeRoot"
type = "string"
description = "Path where the flake is deployed (default: /etc/nixos)"

[[inputs]]
name = "namespaces"
type = "list(string)"
description = "Namespace paths to generate context for (e.g. community/ocd)"

[schema]
id = "context-engine-output"

[[schema.fields]]
name = "manifest.json"
type = "file"
description = "Machine-readable aspect inventory per namespace"

[[schema.fields]]
name = "dependency-map.md"
type = "file"
description = "Human/AI-readable flake dependency table"

[[schema.fields]]
name = "OCD_CONTEXT_HOME"
type = "env-var"
description = "Stable path for OpenClaw context discovery"

[[checkpoints]]
id = "verify-activation-deps"
after-step = 4
assertion = "Activation script declares deps on 'etc' and 'users'"
on-fail = "halt"

[[checkpoints]]
id = "verify-context-home"
after-step = 5
assertion = "OCD_CONTEXT_HOME is set in home.sessionVariables"
on-fail = "halt"
