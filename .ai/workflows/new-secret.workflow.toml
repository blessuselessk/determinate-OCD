[workflow]
id = "new-secret"
description = "Create and wire an agenix-encrypted secret into a NixOS aspect"
mode = "agent"
agent = "nix-aspect-author"

[[workflow.phases]]
name = "Scope"
steps = [
  "Identify what needs a secret (API key, password, certificate, token)",
  "Choose a secret name (kebab-case, descriptive: e.g., `openclaw-telegram-token`)",
  "Identify the consuming aspect and user namespace",
]
checkpoint = "Confirm secret name, consuming aspect, and user namespace before proceeding."

[[workflow.phases]]
name = "Encrypt"
steps = [
  "Create the encrypted `.age` file in `modules/<user>/secrets/`",
  "Add the secret to `age.secrets.<name>` in the user's secrets aspect",
  "Set appropriate `owner`, `group`, and `mode` for the secret",
]

[[workflow.phases]]
name = "Wire"
steps = [
  "Reference the secret via `config.age.secrets.<name>.path` in the consuming aspect",
  "Add `includes` dependency on the secrets aspect in the consuming aspect",
  "Never inline the secret value or hardcode `/run/agenix/` paths",
]

[[workflow.phases]]
name = "Verify"
steps = [
  "`jj file track` the new `.age` file and any modified aspects",
  "Run `nix flake check` — confirm secret path resolves at eval time",
  "Verify the consuming aspect correctly references the secret",
]
