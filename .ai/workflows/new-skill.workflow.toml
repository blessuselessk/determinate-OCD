[workflow]
id = "new-skill"
description = "Create a new PROSE skill primitive"
mode = "agent"
agent = "prose-author"

[[workflow.phases]]
name = "Scope"
steps = [
  "Identify the capability this skill provides and when it activates",
  "Check existing skills in `.ai/skills/` for overlap",
  "Choose a kebab-case name for the skill directory: `.ai/skills/<name>/`",
]
checkpoint = "Confirm the skill name, trigger condition, and purpose before authoring."

[[workflow.phases]]
name = "Author"
steps = [
  "Create directory `.ai/skills/<name>/`",
  "Create `SKILL.toml` with `[skill]` header: name, description, trigger, rules",
  "Add `[[skill.extra-sections]]` for extended reference content if needed",
  "Add `[[skill.references]]` — note paths use `../../` from skill subdirectories",
]

[[workflow.phases]]
name = "Validate"
steps = [
  "Confirm meta tier: no invocation verbs (`activates`, `hands-off-to`, `spawns`)",
  "Verify trigger is a clear, testable condition",
  "Verify rules are actionable and imperative",
  "Check that all reference paths resolve to existing files",
]

[[workflow.phases]]
name = "Integrate"
steps = [
  "`jj file track` the new `SKILL.toml` file",
  "Run `nix run .#write-context-docs` to render the Markdown output",
  "`jj file track` all generated outputs (rendered `SKILL.md`, ref pointers)",
  "Run `nix flake check` to verify staleness checks pass",
]
