[workflow]
id = "new-description"
description = "Create an aspect description TOML for the context-compile pipeline"
mode = "agent"
agent = "nix-aspect-author"

[[workflow.phases]]
name = "Identify Aspect"
steps = [
  "Find the `.nix` source file for the target aspect",
  "Check `_helpers/descriptions/` for an existing description TOML",
  "Confirm the aspect ID (e.g. `ocd.networking`, `lessuseless.jujutsu`)",
]
checkpoint = "Confirm the aspect ID and that no description TOML already exists."

[[workflow.phases]]
name = "Analyze Aspect"
steps = [
  "Read the Nix source to understand what the aspect configures",
  "Extract context entries (key facts about configuration, ports, paths, etc.)",
  "Identify constraints (security, correctness, operational, portability)",
  "Identify steps (what the aspect does in sequence)",
  "Identify inputs and output schema fields if applicable",
]

[[workflow.phases]]
name = "Author Description"
steps = [
  "Create `modules/community/ocd/_helpers/descriptions/<name>.toml`",
  "Add `[aspect]` header with id, version, and role",
  "Add `[context]` with `[[context.entries]]` for key facts",
  "Add `[[constraints]]` with text and severity",
  "Add `[[steps]]` for procedural steps",
  "Add `[[inputs]]` and `[schema]` with `[[schema.fields]]` if the aspect has clear inputs/outputs",
  "Add `[[checkpoints]]` for critical verification points",
]

[[workflow.phases]]
name = "Verify"
steps = [
  "`jj file track` the new description TOML",
  "Run `nix run .#write-context-docs` to render the Markdown output",
  "`jj file track` all generated outputs",
  "Run `nix flake check` to verify the description renders and staleness checks pass",
  "Review the rendered Markdown in `.ai/output/` for completeness",
]
