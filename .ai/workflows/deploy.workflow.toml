[workflow]
id = "deploy"
description = "Build and deploy a NixOS configuration to a target host"
mode = "agent"
agent = "denizen"

[[workflow.phases]]
name = "Pre-flight"
steps = [
  "Confirm target host exists in `den.hosts` (`nix eval .#nixosConfigurations --apply builtins.attrNames`)",
  "Run `nix flake check` — all checks must pass before deploying",
  "Verify all secrets are wired and encrypted files are tracked",
]
checkpoint = "Confirm target host, all checks pass, and secrets are ready before building."

[[workflow.phases]]
name = "Build"
steps = [
  "Build the system closure: `nix build .#nixosConfigurations.<hostname>.config.system.build.toplevel`",
  "For ISO: `nix build .#nixosConfigurations.<hostname>.config.system.build.isoImage`",
  "Verify the build completes without errors",
]

[[workflow.phases]]
name = "Deploy"
steps = [
  "Remote deploy via FlakeHub: `fh apply nixos \"org/flake/*#nixosConfigurations.<hostname>\"`",
  "For ISO: write to USB or use in VM — manual install process",
  "For local: `sudo nixos-rebuild switch --flake .#<hostname>`",
]

[[workflow.phases]]
name = "Validate"
steps = [
  "Verify the target host is reachable (SSH or console)",
  "Check that services are running: `systemctl --failed`",
  "Review activation log for errors: `journalctl -b -p err`",
]
