# Dep reference manifest — source of truth for update-dep-refs
# Each [[dep]] generates a {name}.md file in this directory.
# Fields:
#   name        (required) — dep name, becomes filename
#   repo        (required) — github:owner/repo reference
#   context7    (optional) — Context7 library ID; if absent, falls back to GitHub README
#   query       (required) — search query for Context7 or description of what to extract
#   description (required) — one-line summary for the blockquote header

# --- den ecosystem (vic) ---

[[dep]]
name = "den"
repo = "github:vic/den"
context7 = "/vic/den"
query = "What is den, aspects, includes, namespaces, API"
description = "Context-aware framework for building modular Nix configurations for NixOS, nix-darwin, and home-manager using declarative dendritic libraries."

[[dep]]
name = "import-tree"
repo = "github:vic/import-tree"
context7 = "/vic/import-tree"
query = "What is import-tree, filters, API, conventions"
description = "Recursively imports Nix modules from a directory, providing a simple, extensible API for NixOS, home-manager, and flake-parts."

[[dep]]
name = "flake-file"
repo = "github:vic/flake-file"
context7 = "/vic/flake-file"
query = "What is flake-file, declaring inputs, commands, check"
description = "Generates clean, maintainable flake.nix from Nix module options. Declare inputs where you use them."

[[dep]]
name = "flake-aspects"
repo = "github:vic/flake-aspects"
context7 = "/vic/flake-aspects"
query = "What is flake-aspects, transposes aspects to modules, API"
description = "A flake-parts module that transposes flake.aspects into flake.modules for intuitive dendritic configuration with cross-aspect dependency management."

[[dep]]
name = "with-inputs"
repo = "github:vic/with-inputs"
query = "What is with-inputs, input resolution, follows"
description = "Flake-like input resolution for non-flake Nix projects. Manages follows, local checkouts, and sub-input overrides."

[[dep]]
name = "denful"
repo = "github:vic/denful"
context7 = "/vic/denful"
query = "What is denful, modules, facets, utilities"
description = "Dendritic Nix modules, enough to fill a den. Reusable facets and shared utilities for den-based configurations."

[[dep]]
name = "dendrix"
repo = "github:vic/dendrix"
context7 = "/vic/dendrix"
query = "What is dendrix, community modules, discovery"
description = "Community platform for sharing and discovering dendritic Nix sub-trees. The AUR of Dendritic Nix."

[[dep]]
name = "vix"
repo = "github:vic/vix"
context7 = "/vic/vix"
query = "What is vix, aspects, NixOS hosts"
description = "Vic's Nix Environment. A dendritic configuration providing reusable aspects for NixOS hosts."

[[dep]]
name = "checkmate"
repo = "github:vic/checkmate"
query = "What is checkmate, flake check, output"
description = "Nix flake check runner with structured output and parallel execution."

